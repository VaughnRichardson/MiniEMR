<html lang="en">

<title>Chart by Exception</title>
<style>
  :root{
    --bg:#0f1216; --panel:#171b21; --card:#1e242c; --card-2:#222a33; --edge:#2a323c;
    --ink:#f3f5f7; --dim:#aeb6c0; --faint:#6c7783; --line:#252c34;
    --clear:#31c08a; --clear-d:#1f8f66; --flag:#ef5d52; --flag-d:#c23f36;
    --neg:#4ea3e0; --neg-d:#2f7cb5; --defer:#8b94a0; --defer-d:#5f6873; --amber:#e0a042;
    --pad: env(safe-area-inset-bottom, 0px); --top: env(safe-area-inset-top, 0px);
    --display: ui-rounded, 'SF Pro Rounded', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --body: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html{height:-webkit-fill-available;}
  body{min-height:-webkit-fill-available; background:var(--bg); color:var(--ink); font-family:var(--body);
    overscroll-behavior:none; -webkit-user-select:none; user-select:none; overflow:hidden;}
  #app{position:relative; width:100%; max-width:480px; margin:0 auto;
    height:100dvh; min-height:-webkit-fill-available; display:flex; flex-direction:column; background:var(--bg);}
  button{font-family:inherit;}
  :focus-visible{outline:2px solid var(--neg); outline-offset:2px;}
  .view{display:none; flex:1 1 auto; min-height:0; flex-direction:column;}
  .view.on{display:flex;}
  .toast{position:fixed; left:50%; bottom:calc(var(--pad) + 120px); transform:translate(-50%,12px);
    background:var(--ink); color:var(--bg); font-size:13.5px; font-weight:600; padding:11px 18px;
    border-radius:12px; opacity:0; pointer-events:none; z-index:80; transition:opacity .2s, transform .2s;
    max-width:88%; text-align:center;}
  .toast.on{opacity:1; transform:translate(-50%,0);}
  .head-row{display:flex; align-items:center; gap:12px; padding:calc(var(--top) + 16px) 18px 6px;}
  .head-row h1{font-family:var(--display); font-weight:700; font-size:22px; letter-spacing:.4px;}
  .head-row .sp{margin-left:auto;}
  .linkbtn{background:none; border:none; color:var(--neg); font-size:15px; font-weight:600; cursor:pointer; padding:6px;}
  .scroll{flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:6px 18px 10px;}
  .sect-label{font-family:var(--mono); font-size:10.5px; letter-spacing:1.6px; color:var(--faint);
    text-transform:uppercase; margin:14px 2px 9px;}
  .presets{display:flex; flex-wrap:wrap; gap:9px;}
  .preset{border:1.5px solid var(--edge); background:var(--card); color:var(--dim); border-radius:12px;
    padding:11px 15px; font-size:14.5px; cursor:pointer; font-family:var(--body);}
  .preset.on{border-color:var(--neg); background:rgba(78,163,224,.12); color:#cfe6f7;}
  .sysgrid{display:flex; flex-direction:column; gap:8px; margin-top:4px;}
  .sysrow{display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:11px 14px; cursor:pointer;}
  .sysrow .gi{width:24px; height:24px; color:var(--faint); flex:none;}
  .sysrow.on .gi{color:var(--ink);}
  .sysrow .nm{font-size:15px; color:var(--dim);}
  .sysrow.on .nm{color:var(--ink); font-weight:600;}
  .sysrow .chk{margin-left:auto; width:24px; height:24px; border-radius:7px; border:1.5px solid var(--edge);
    display:flex; align-items:center; justify-content:center; color:var(--bg);}
  .sysrow.on .chk{background:var(--clear); border-color:var(--clear);}
  .sysrow .chk svg{width:16px; height:16px; opacity:0;}
  .sysrow.on .chk svg{opacity:1;}
  .savepreset{display:flex; gap:9px; margin-top:12px;}
  .savepreset input{flex:1; background:var(--card); border:1.5px solid var(--edge); border-radius:11px;
    padding:11px 13px; color:var(--ink); font-size:14px; -webkit-user-select:text; user-select:text;}
  .footbar{display:flex; gap:12px; padding:12px 18px calc(var(--pad) + 16px); border-top:1px solid var(--line);}
  .btn{flex:1; height:56px; border-radius:16px; border:none; cursor:pointer; font-family:var(--display);
    font-weight:700; font-size:16px; letter-spacing:.3px; transition:transform .08s ease, opacity .12s; color:#fff;}
  .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.4; cursor:default;}
  .btn.primary{background:var(--clear);}
  .btn.dark{background:var(--panel); color:var(--ink); border:1px solid var(--line);}
  .btn.ghost{background:transparent; border:1.5px solid var(--edge); color:var(--dim); flex:0 0 auto; padding:0 18px;}
  .topbar{display:flex; align-items:center; gap:12px; padding:calc(var(--top) + 14px) 18px 8px;}
  .tb-btn{background:none; border:none; color:var(--dim); font-size:15px; padding:6px 2px; cursor:pointer;}
  .tb-btn:disabled{opacity:.3; cursor:default;}
  .counter{font-family:var(--mono); font-size:13px; color:var(--faint); letter-spacing:.5px; font-variant-numeric:tabular-nums;}
  .tb-name{margin-left:auto; font-family:var(--mono); font-size:11px; letter-spacing:1.5px; color:var(--faint); text-transform:uppercase;}
  .rail{height:3px; background:var(--line); border-radius:99px; margin:2px 18px 4px; overflow:hidden;}
  .rail > i{display:block; height:100%; background:var(--clear); width:0; border-radius:99px; transition:width .35s cubic-bezier(.22,1,.36,1);}
  .deck{position:relative; flex:1 1 auto; min-height:0; margin:8px 18px 4px;}
  .ex-card{position:absolute; inset:0; background:var(--card); border:1px solid var(--edge); border-radius:26px;
    box-shadow:0 18px 40px -22px rgba(0,0,0,.8); display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:24px; will-change:transform; touch-action:none;}
  .glyph{width:138px; height:138px; color:var(--ink); opacity:.96;}
  .glyph svg{width:100%; height:100%;}
  .ex-name{font-family:var(--display); font-weight:700; font-size:30px; letter-spacing:1.2px; text-transform:uppercase;
    text-align:center; margin-top:22px; line-height:1.05;}
  .ex-hint{margin-top:12px; font-size:13px; color:var(--faint); text-align:center;}
  .stamp{position:absolute; padding:7px 15px; border-radius:10px; font-family:var(--display); font-weight:800;
    font-size:22px; letter-spacing:2.5px; border:3px solid; opacity:0; pointer-events:none;}
  .stamp.clear{top:48px; right:24px; color:var(--clear); border-color:var(--clear); transform:rotate(10deg);}
  .stamp.flag{top:48px; left:24px; color:var(--flag); border-color:var(--flag); transform:rotate(-10deg);}
  .stamp.neg{top:22px; left:50%; margin-left:-58px; color:var(--neg); border-color:var(--neg);}
  .stamp.defer{bottom:26px; left:50%; margin-left:-54px; color:var(--defer); border-color:var(--defer);}
  .vcard{position:absolute; inset:0; background:var(--card); border:1px solid var(--edge); border-radius:26px;
    box-shadow:0 18px 40px -22px rgba(0,0,0,.8); display:flex; flex-direction:column; overflow:hidden;}
  .vhead{display:flex; align-items:center; gap:12px; padding:16px 18px 12px; border-bottom:1px solid var(--line);}
  .vhead .gi{width:30px; height:30px; color:var(--ink);}
  .vhead .nm{font-family:var(--display); font-weight:700; font-size:20px; letter-spacing:1px; text-transform:uppercase;}
  .vlist{flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:6px 14px;}
  .vrow{display:flex; align-items:center; gap:12px; padding:13px 8px; border-bottom:1px solid var(--line); touch-action:none;}
  .vrow:last-child{border-bottom:none;}
  .vrow .vlab{font-size:15px; color:var(--dim); flex:1;}
  .vrow .vlast{font-family:var(--mono); font-size:11px; color:var(--faint); margin-right:4px;}
  .vrow .vbox{min-width:96px; text-align:right; display:flex; align-items:baseline; gap:5px; justify-content:flex-end;}
  .vrow .vnum{font-family:var(--display); font-weight:700; font-size:26px; color:var(--ink); font-variant-numeric:tabular-nums;}
  .vrow .vnum.unset{color:var(--faint);}
  .vrow .vunit{font-size:12px; color:var(--faint);}
  .vrow.flagged .vnum{color:var(--flag);}
  .vrow .vin{width:78px; background:var(--card-2); border:1.5px solid var(--neg); border-radius:9px; padding:6px 8px;
    color:var(--ink); font-size:18px; text-align:right; font-family:var(--display); -webkit-user-select:text; user-select:text;}
  .vrow .grip{font-family:var(--mono); font-size:13px; color:var(--defer-d); opacity:.7;}
  .vhint{text-align:center; font-size:12px; color:var(--faint); padding:8px 0 4px;}
  .actions{display:flex; gap:12px; padding:6px 18px 6px;}
  .act{flex:1; height:60px; border-radius:18px; border:1px solid var(--line); background:var(--panel); color:var(--ink);
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:9px; font-family:var(--display);
    font-weight:600; font-size:16px; letter-spacing:.3px; transition:transform .08s ease;}
  .act:active{transform:scale(.96);}
  .act .ic{width:22px; height:22px;}
  .act.flag,.act.flag .ic{color:var(--flag);}
  .act.clear,.act.clear .ic{color:var(--clear);}
  .act.record{background:var(--clear); color:#fff; border-color:transparent;}
  .act.small{flex:0 0 auto; padding:0 13px; height:60px; font-size:13.5px;}
  .act.defer,.act.defer .ic{color:var(--defer);}
  .act.neg,.act.neg .ic{color:var(--neg);}
  .act small{font-family:var(--mono); font-size:9px; letter-spacing:1px; color:var(--faint); display:block;}
  .nav{display:flex; align-items:stretch; border-top:1px solid var(--line); padding-bottom:var(--pad);}
  .nav button{flex:1; background:none; border:none; color:var(--faint); cursor:pointer; display:flex;
    flex-direction:column; align-items:center; gap:3px; padding:9px 0 7px; font-family:var(--body);}
  .nav button .ic{width:22px; height:22px;}
  .nav button span{font-size:10.5px; letter-spacing:.2px;}
  .nav button:disabled{opacity:.32; cursor:default;}
  .nav button.hot{color:var(--clear);}
  .tabs{display:flex; gap:6px; padding:10px 18px 4px;}
  .tab{flex:1; text-align:center; padding:10px; border-radius:11px; background:var(--panel); border:1px solid var(--line);
    color:var(--dim); font-family:var(--display); font-weight:600; font-size:14.5px; cursor:pointer;}
  .tab.on{background:var(--card-2); color:var(--ink); border-color:var(--edge);}
  .rv-meta{display:flex; align-items:center; gap:8px; padding:8px 18px 6px;}
  .init{background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:9px; color:var(--ink);
    font-size:14px; -webkit-user-select:text; user-select:text;}
  .rv-meta input.init{width:104px;}
  .rv-date{margin-left:auto; display:flex; align-items:center; gap:4px;}
  .nd{background:var(--panel); border:1px solid var(--line); color:var(--dim); width:30px; height:34px; border-radius:9px; font-size:18px; cursor:pointer;}
  .rv-date input{width:72px; text-align:center; background:var(--panel); border:1px solid var(--line); border-radius:9px;
    padding:8px; color:var(--ink); font-family:var(--mono); font-size:14px; -webkit-user-select:text; user-select:text;}
  .sec{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:13px 15px; margin-bottom:11px; cursor:pointer;}
  .sec.abn{border-left:3px solid var(--flag);}
  .sec.norm{border-left:3px solid var(--clear-d);}
  .sec.def{border-left:3px solid var(--defer-d);}
  .sec .h{display:flex; align-items:center; gap:9px; margin-bottom:6px;}
  .sec .h .gi{width:18px; height:18px; color:var(--faint);}
  .sec .h .nm{font-family:var(--display); font-weight:700; font-size:13px; letter-spacing:1.3px; text-transform:uppercase;}
  .sec .h .tag{margin-left:auto; font-family:var(--mono); font-size:9.5px; letter-spacing:1px; text-transform:uppercase; color:var(--faint);}
  .sec.abn .h .tag{color:var(--flag);} .sec.def .h .tag{color:var(--defer);}
  .sec .txt{font-size:14px; line-height:1.5; color:var(--dim);}
  .sec .txt b{color:#ffd9d4; font-weight:600;}
  .sec .txt .neg{color:#cfe6f7; font-weight:500;}
  .sec .thumbs{display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;}
  .sec .thumbs img{width:54px; height:54px; object-fit:cover; border-radius:8px; border:1px solid var(--edge);}
  .notebox{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; font-size:14.5px;
    line-height:1.6; color:var(--dim); white-space:pre-wrap; -webkit-user-select:text; user-select:text;}
  .neuro-tog{font-family:var(--mono); font-size:11px; color:var(--clear); text-decoration:underline; cursor:pointer; display:inline-block; margin-top:6px;}
  .enc{background:var(--card); border:1px solid var(--line); border-radius:13px; padding:13px 15px; margin-bottom:10px;}
  .enc .top{display:flex; align-items:center; gap:10px;}
  .enc .lab{font-family:var(--display); font-weight:700; font-size:16px;}
  .enc .st{font-family:var(--mono); font-size:9.5px; letter-spacing:1px; text-transform:uppercase; padding:3px 8px; border-radius:6px;}
  .enc .st.done{color:var(--clear); background:rgba(49,192,138,.12);}
  .enc .st.prog{color:var(--amber); background:rgba(224,160,66,.12);}
  .enc .sub{font-size:12.5px; color:var(--faint); margin-top:3px;}
  .enc .row{display:flex; gap:8px; margin-top:11px;}
  .enc .row button{flex:1; background:var(--panel); border:1px solid var(--line); color:var(--dim); border-radius:9px;
    padding:9px; font-size:13px; cursor:pointer; font-family:var(--body);}
  .enc .row button.danger{color:var(--flag); flex:0 0 auto; padding:9px 13px;}
  .empty{text-align:center; color:var(--faint); font-size:14px; padding:40px 20px;}
  .scrim{position:fixed; inset:0; background:rgba(6,8,10,.55); opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:30; backdrop-filter:blur(2px);}
  .scrim.on{opacity:1; pointer-events:auto;}
  .sheet{position:fixed; left:50%; bottom:0; transform:translate(-50%,100%); width:100%; max-width:480px; max-height:90dvh;
    z-index:40; background:var(--panel); border-radius:24px 24px 0 0; border:1px solid var(--line); border-bottom:none;
    box-shadow:0 -20px 50px -20px rgba(0,0,0,.85); display:flex; flex-direction:column; transition:transform .34s cubic-bezier(.22,1.05,.36,1);}
  .sheet.on{transform:translate(-50%,0);}
  .handle{width:42px; height:5px; border-radius:99px; background:var(--edge); margin:10px auto 4px; flex:none;}
  .sheet-head{display:flex; align-items:center; gap:14px; padding:6px 22px 14px; border-bottom:1px solid var(--line); flex:none;}
  .sheet-glyph{width:44px; height:44px; flex:none;} .sheet-glyph svg{width:100%;height:100%;}
  .sheet-head.flag .sheet-glyph{color:var(--flag);} .sheet-head.neg .sheet-glyph{color:var(--neg);}
  .sheet-title .k{font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--faint); text-transform:uppercase;}
  .sheet-title .n{font-family:var(--display); font-weight:700; font-size:21px; letter-spacing:1px; text-transform:uppercase;}
  .sheet-scroll{overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px 18px 8px; flex:1 1 auto; min-height:0;}
  .chips{display:flex; flex-wrap:wrap; gap:10px;}
  .chip{border:1.5px solid var(--edge); background:var(--card); color:var(--dim); border-radius:13px; padding:13px 15px;
    font-size:15px; cursor:pointer; font-family:var(--body); line-height:1.1; min-height:46px;
    transition:transform .07s ease, background .12s, border-color .12s, color .12s;}
  .chip:active{transform:scale(.95);}
  .chip.on{background:rgba(239,93,82,.12); border-color:var(--flag); color:#ffd9d4;}
  .chip.neg.on{background:rgba(78,163,224,.12); border-color:var(--neg); color:#cfe6f7;}
  .fblock{border:1px solid var(--line); background:var(--card); border-radius:14px; padding:12px; margin:12px 0;}
  .fblock .ft{display:flex; align-items:center; gap:8px; margin-bottom:9px;}
  .fblock .ft .fn{font-weight:600; font-size:14.5px; color:#ffd9d4;}
  .fblock .ft .x{margin-left:auto; color:var(--flag); font-weight:700; cursor:pointer; padding:2px 8px;}
  .axlab{font-family:var(--mono); font-size:9.5px; letter-spacing:1.4px; color:var(--faint); text-transform:uppercase; margin:9px 0 6px;}
  .subchips{display:flex; flex-wrap:wrap; gap:7px;}
  .subchip{border:1.5px solid var(--edge); background:var(--card-2); color:var(--dim); border-radius:9px; padding:8px 11px;
    font-size:13px; cursor:pointer; font-family:var(--body); min-height:38px;}
  .subchip.on{background:rgba(224,160,66,.14); border-color:var(--amber); color:#f6e2bf;}
  .subchip.lat.on{background:rgba(78,163,224,.14); border-color:var(--neg); color:#cfe6f7;}
  .fbtns{display:flex; gap:8px; margin-top:11px; flex-wrap:wrap;}
  .fbtns button,.fbtns label{background:var(--card-2); border:1px solid var(--edge); color:var(--dim); border-radius:9px;
    padding:9px 12px; font-size:13px; cursor:pointer; font-family:var(--body); display:flex; align-items:center; gap:6px;}
  .fbtns .ic{width:15px; height:15px;}
  .fthumb{width:46px; height:46px; object-fit:cover; border-radius:8px; border:1px solid var(--edge); margin-top:8px;}
  .freewrap{margin-top:14px; position:relative;}
  .freewrap input{width:100%; background:var(--card); border:1.5px solid var(--edge); border-radius:13px; padding:13px 46px 13px 15px;
    color:var(--ink); font-family:var(--body); font-size:15px; -webkit-user-select:text; user-select:text;}
  .freewrap input::placeholder{color:var(--faint);}
  .freewrap input:focus{outline:none; border-color:var(--amber);}
  .mic{position:absolute; right:8px; top:50%; transform:translateY(-50%); width:32px; height:32px; border-radius:8px;
    background:var(--card-2); border:1px solid var(--edge); color:var(--dim); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .mic.rec{color:var(--flag); border-color:var(--flag);}
  .mic svg{width:16px;height:16px;}
  .sheet-foot{display:flex; gap:12px; padding:14px 18px calc(var(--pad) + 14px); border-top:1px solid var(--line); flex:none;}
  .bodywrap{margin-top:8px;}
  .bodysvg{width:100%; max-width:230px; display:block; margin:6px auto;}
  .bodysvg .rg{fill:var(--card-2); stroke:var(--edge); stroke-width:1.4; cursor:pointer;}
  .bodysvg .rg.on{fill:rgba(78,163,224,.35); stroke:var(--neg); stroke-width:2;}
  .bodytabs{display:flex; gap:8px; justify-content:center; margin-bottom:4px;}
  .bodytabs button{background:var(--card-2); border:1px solid var(--edge); color:var(--dim); border-radius:8px; padding:6px 14px; font-size:12.5px; cursor:pointer;}
  .bodytabs button.on{border-color:var(--neg); color:#cfe6f7;}
  .bodysel{text-align:center; font-size:13px; color:var(--neg); min-height:18px; margin-top:2px;}
  .listrow{display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--line); border-radius:11px;
    padding:13px 15px; margin-bottom:8px; cursor:pointer;}
  .listrow .gi{width:22px;height:22px;color:var(--faint);} .listrow .nm{font-size:15px; color:var(--ink);}
  .listrow .st{margin-left:auto; font-family:var(--mono); font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--faint);}
  .listrow .st.clear{color:var(--clear);} .listrow .st.flag{color:var(--flag);} .listrow .st.def{color:var(--defer);}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<input type="checkbox" id="hap" switch style="position:absolute;opacity:0;pointer-events:none;width:0;height:0">
<label for="hap" id="hapLabel" style="position:absolute;opacity:0;pointer-events:none;"></label>
<div id="app">
  <div class="view" id="v-setup">
    <div class="head-row"><h1>New exam</h1><button class="linkbtn sp" onclick="showHistory()">History</button></div>
    <div class="scroll">
      <div class="sect-label">Quick presets</div>
      <div class="presets" id="presets"></div>
      <div class="sect-label">Systems in this exam</div>
      <div class="sysgrid" id="sysgrid"></div>
      <div class="savepreset">
        <input type="text" id="presetName" placeholder="Save current selection as…">
        <button class="btn ghost" onclick="saveCurrentPreset()">Save</button>
      </div>
    </div>
    <div class="footbar">
      <input class="init" id="setupInit" placeholder="Pt initials" style="flex:0 0 110px;">
      <button class="btn primary" id="startBtn" onclick="startExam()">Start exam</button>
    </div>
  </div>
  <div class="view" id="v-deck">
    <div class="topbar">
      <button class="tb-btn" id="backBtn" onclick="goBack()">‹ Back</button>
      <span class="counter" id="counter">01 / 16</span>
      <span class="tb-name" id="ptTag"></span>
    </div>
    <div class="rail"><i id="railFill"></i></div>
    <div class="deck" id="deck"></div>
    <div class="actions" id="actions"></div>
    <div class="nav" id="nav"></div>
  </div>
  <div class="view" id="v-review">
    <div class="head-row">
      <button class="tb-btn" onclick="leaveReview()">‹</button>
      <h1 style="font-size:20px">Encounter</h1>
      <button class="linkbtn sp" onclick="finishAndClose()">Done</button>
    </div>
    <div class="tabs">
      <div class="tab on" id="tabChart" onclick="setTab('chart')">Chart</div>
      <div class="tab" id="tabNote" onclick="setTab('note')">Suggested note</div>
    </div>
    <div class="rv-meta">
      <input class="init" id="adateInit" placeholder="Pt initials">
      <div class="rv-date"><button class="nd" onclick="nudge(-1)">−</button><input type="text" id="adate"><button class="nd" onclick="nudge(1)">+</button></div>
    </div>
    <div class="scroll" id="rvScroll"></div>
    <div class="footbar">
      <button class="btn ghost" onclick="editFromReview()">Edit</button>
      <button class="btn dark" id="copyBtn" onclick="copyCurrent()">Copy</button>
      <button class="btn primary" id="shareBtn" onclick="shareCurrent()" style="background:var(--clear)">Share</button>
    </div>
  </div>
  <div class="view" id="v-history">
    <div class="head-row"><button class="tb-btn" onclick="showSetup()">‹</button><h1 style="font-size:20px">Encounters</h1><button class="linkbtn sp" onclick="showSetup()">+ New</button></div>
    <div class="scroll" id="histList"></div>
  </div>
  <div class="scrim" id="scrim" onclick="dismissSheet()"></div>
  <div class="sheet" id="sheet">
    <div class="handle" onclick="dismissSheet()"></div>
    <div class="sheet-head" id="sheetHead">
      <span class="sheet-glyph" id="sheetGlyph"></span>
      <div class="sheet-title"><div class="k" id="sheetKicker">specify findings</div><div class="n" id="sheetName"></div></div>
    </div>
    <div class="sheet-scroll">
      <div class="chips" id="sheetChips"></div>
      <div id="sheetAxes"></div>
      <div class="bodywrap" id="sheetBody" style="display:none"></div>
      <div class="freewrap" id="freeWrap">
        <input type="text" id="freeIn" placeholder="Other finding — not listed" oninput="refreshSave()">
        <button class="mic" id="micBtn" onclick="toggleMic()" aria-label="Dictate"></button>
      </div>
    </div>
    <div class="sheet-foot" id="sheetFoot"></div>
  </div>
  <div class="scrim" id="scrim2" onclick="closeJump()"></div>
  <div class="sheet" id="sheet2">
    <div class="handle" onclick="closeJump()"></div>
    <div class="sheet-head"><div class="sheet-title"><div class="k">jump to system</div><div class="n">Systems</div></div></div>
    <div class="sheet-scroll" id="jumpList"></div>
    <div class="sheet-foot"><button class="btn dark" onclick="closeJump()" style="flex:1">Close</button></div>
  </div>
  <div class="toast" id="toast" aria-live="polite"></div>
</div>

function attachCompass(card){
  let sx=0,sy=0,dx=0,dy=0,t0=0,drag=false,axis=null;
  const sC=card.querySelector('.stamp.clear'),sF=card.querySelector('.stamp.flag'),sN=card.querySelector('.stamp.neg'),sD=card.querySelector('.stamp.defer');
  const W=card.offsetWidth||340,H=card.offsetHeight||480;
  const TX=Math.min(W*0.28,120),TY=Math.min(H*0.20,150);
  function resist(v,t){const a=Math.abs(v);return a<=t?v:Math.sign(v)*(t+(a-t)*0.35);}
  function down(e){drag=true;axis=null;sx=e.clientX;sy=e.clientY;t0=performance.now();card.style.transition='none';try{card.setPointerCapture(e.pointerId);}catch(_){}}
  function move(e){if(!drag)return;dx=e.clientX-sx;dy=e.clientY-sy;
    if(axis===null&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'x':'y';
    if(e.cancelable)e.preventDefault();
    if(axis==='x'){const v=resist(dx,TX);card.style.transform=`translateX(${v}px) rotate(${v*0.05}deg)`;
      const p=Math.min(Math.abs(dx)/TX,1);sN.style.opacity=0;sD.style.opacity=0;
      if(dx>0){sC.style.opacity=p;sF.style.opacity=0;}else{sF.style.opacity=p;sC.style.opacity=0;}}
    else if(axis==='y'){const v=resist(dy,TY);card.style.transform=`translateY(${v}px)`;
      const p=Math.min(Math.abs(dy)/TY,1);sC.style.opacity=0;sF.style.opacity=0;
      if(dy<0){sN.style.opacity=p;sD.style.opacity=0;}else{sD.style.opacity=p;sN.style.opacity=0;}}
  }
  function reset(){card.style.transition='transform .34s cubic-bezier(.22,1,.36,1)';card.style.transform='';
    sC.style.opacity=0;sF.style.opacity=0;sN.style.opacity=0;sD.style.opacity=0;}
  function up(){if(!drag)return;drag=false;const dt=performance.now()-t0;
    if(axis==='x'){const vel=dx/Math.max(dt,1);const go=Math.abs(dx)>TX||(Math.abs(dx)>40&&Math.abs(vel)>0.55);
      if(!go){reset();return;} if(dx>0){flyOff(card,'right',doClear);}else{reset();actFlag();}}
    else if(axis==='y'){const vel=dy/Math.max(dt,1);const go=Math.abs(dy)>TY||(Math.abs(dy)>40&&Math.abs(vel)>0.55);
      if(!go){reset();return;} if(dy>0){flyOff(card,'down',doDefer);}else{reset();actNeg();}}
    else reset();}
  card.addEventListener('pointerdown',down);card.addEventListener('pointermove',move);
  card.addEventListener('pointerup',up);card.addEventListener('pointercancel',up);
}
function flyOff(card,dir,cb){
  const W=window.innerWidth,off=Math.min(W,520);let tf='';
  if(dir==='right')tf=`translateX(${off}px) rotate(13deg)`;
  else if(dir==='left')tf=`translateX(${-off}px) rotate(-13deg)`;
  else if(dir==='down')tf=`translateY(${Math.min(window.innerHeight,700)}px)`;
  card.style.transition='transform .28s ease-out, opacity .28s ease-out';
  card.style.transform=tf;card.style.opacity='0';setTimeout(cb,220);
}
function pushUndo(si){ undoStack.push({idx,si,snap:JSON.parse(JSON.stringify(R(si)))}); if(undoStack.length>40)undoStack.shift(); }
function undo(){ if(undoStack.length===0)return; const u=undoStack.pop(); enc.results[u.si]=u.snap; idx=u.idx; buzz(8); syncEnc();

function lastVitals(){ for(const e of DB.encounters){ if(enc&&e.id===enc.id)continue; const r=e.results[VITALS]; if(r&&r.values&&Object.values(r.values).some(v=>v!==''&&v!=null))return r.values; } return null; }
function fmtVal(f,v){ if(v===''||v==null)return '—'; return f.step<1?(Math.round(v*10)/10).toFixed(1):String(Math.round(v)); }
function fieldFlagged(f,v){ if(v===''||v==null)return false; if(f.lo==null&&f.hi==null)return false; if(f.lo!=null&&v<f.lo)return true; if(f.hi!=null&&v>f.hi)return true; return false; }
function valuesFlagged(vals){ return VITAL_FIELDS.some(f=>fieldFlagged(f,vals[f.key])); }
function renderValueCard(si){
  const vals=R(si).values||{}; const last=lastVitals();

    rows+=`<div class="vrow ${flg?'flagged':''}" data-key="${f.key}" id="vrow-${f.key}">
      <span class="vlab">${f.label}</span>${lastTxt}
      <span class="vbox"><span class="vnum ${v===''||v==null?'unset':''}" id="vnum-${f.key}">${fmtVal(f,v)}</span><span class="vunit">${f.unit}</span></span>
      <span class="grip">⇅</span></div>`;
  });
  c.innerHTML=`<div class="vhead"><span class="gi">${ICONS.vitals}</span><span class="nm">VITALS</span></div>
    <div class="vlist">${rows}<div class="vhint">drag a value up / down · tap to type</div></div>`;

function attachValueDrag(row,f){
  let sy=0,start=0,drag=false;
  function down(e){ if(e.target.classList.contains('vin'))return; drag=true; sy=e.clientY;
    const cur=R(curSys()).values[f.key]; start=(cur===''||cur==null)?f.def:cur; try{row.setPointerCapture(e.pointerId);}catch(_){}}
  function move(e){ if(!drag)return; const dy=e.clientY-sy; if(Math.abs(dy)<3)return; if(e.cancelable)e.preventDefault();
    let steps=Math.round(-dy/6); let nv=clamp(start+steps*f.step,f.min,f.max); nv=Math.round(nv/f.step)*f.step;
    R(curSys()).values[f.key]=nv; const n=$('vnum-'+f.key); if(n){n.textContent=fmtVal(f,nv);n.classList.remove('unset');}
    $('vrow-'+f.key).classList.toggle('flagged',fieldFlagged(f,nv)); }
  function up(e){ if(!drag)return; drag=false; const moved=Math.abs(e.clientY-sy)>=3;
    if(!moved){ openTypeInput(row,f); } else { buzz(6); syncEnc(); } }
  row.addEventListener('pointerdown',down);row.addEventListener('pointermove',move);
  row.addEventListener('pointerup',up);row.addEventListener('pointercancel',up);
}
function openTypeInput(row,f){
  const box=row.querySelector('.vbox'); const cur=R(curSys()).values[f.key];
  box.innerHTML=`<input class="vin" type="number" inputmode="decimal" step="${f.step}" value="${cur===''||cur==null?'':cur}"><span class="vunit">${f.unit}</span>`;
  const inp=box.querySelector('.vin'); inp.focus(); inp.select&&inp.select();
  function done(){ let val=inp.value.trim(); let nv=val===''?'':clamp(parseFloat(val),f.min,f.max); if(val!==''&&isNaN(nv))nv='';
    R(curSys()).values[f.key]=nv;
    box.innerHTML=`<span class="vnum ${nv===''?'unset':''}" id="vnum-${f.key}">${fmtVal(f,nv)}</span><span class="vunit">${f.unit}</span>`;
    row.classList.toggle('flagged',fieldFlagged(f,nv)); syncEnc(); }
  inp.addEventListener('blur',done); inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
}

  buildChips(); renderAxes(); hideBody();
  $('sheetFoot').innerHTML=`<button class="btn ghost" onclick="sheetMarkClear()">No findings</button>
    <button class="btn primary" id="saveBtn" onclick="sheetSave()">Save findings</button>`;
  refreshSave();
  $('scrim').classList.add('on'); $('sheet').classList.add('on');
}
function openNegSheet(si){
  const s=SYSTEMS[si]; if(!s.neg||!s.neg.length){toast('No quick negatives for this system');return;}
  sheetMode='neg'; sSys=si; workNeg=(R(si).negatives||[]).slice();
  $('sheetHead').className='sheet-head neg';
  $('sheetGlyph').innerHTML=ICONS[s.icon];
  $('sheetKicker').textContent='assert pertinent negatives';
  $('sheetName').textContent=s.name;
  $('freeWrap').style.display='none'; $('sheetAxes').innerHTML=''; hideBody();
  $('sheetChips').innerHTML=s.neg.map((t,i)=>`<button class="chip neg ${workNeg.includes(t)?'on':''}" onclick="toggleNeg(${i})">${esc(t)}</button>`).join('');
  $('sheetFoot').innerHTML=`<button class="btn ghost" onclick="dismissSheet()">Cancel</button>
    <button class="btn primary" style="background:var(--neg)" onclick="negSave()">Mark clear + record</button>`;
  $('scrim').classList.add('on'); $('sheet').classList.add('on');
}
function actFlag(){ openSheet(curSys()); }
function actNeg(){ openNegSheet(curSys()); }
function toggleNeg(i){ const t=SYSTEMS[sSys].neg[i]; const k=workNeg.indexOf(t); if(k>=0)workNeg.splice(k,1); else workNeg.push(t); buzz(8);
  const c=$('sheetChips').children[i]; if(c)c.classList.toggle('on'); }
function negSave(){ const si=sSys; pushUndo(si); enc.results[si]={status:'clear',findings:[],free:'',negatives:workNeg.slice()}; buzz(12); closeSheet(()=>advance()); }

function buildChips(){
  const s=SYSTEMS[sSys];
  const sorted=s.abn.map((a,i)=>({a,i})).sort((x,y)=>x.a.label.localeCompare(y.a.label));
  $('sheetChips').innerHTML=sorted.map(o=>{ const on=work.some(f=>f.abnIdx===o.i);
    return `<button class="chip ${on?'on':''}" data-i="${o.i}" onclick="toggleFinding(${o.i})" aria-pressed="${on}">${esc(o.a.label)}</button>`; }).join('');
}
function toggleFinding(ai){
  const k=work.findIndex(f=>f.abnIdx===ai);
  if(k>=0){ work.splice(k,1); delete photos[sSys+'-'+ai]; } else work.push({abnIdx:ai,loc:'',sev:'',lat:'',onset:''});
  buzz(8);
  const chip=document.querySelector('#sheetChips .chip[data-i="'+ai+'"]');
  if(chip){const on=work.some(f=>f.abnIdx===ai);chip.classList.toggle('on',on);chip.setAttribute('aria-pressed',on);}
  renderAxes(); refreshSave();
}
function renderAxes(){
  const s=SYSTEMS[sSys]; let h='';
  work.forEach((f,fi)=>{
    const a=s.abn[f.abnIdx];
    h+=`<div class="fblock"><div class="ft"><span class="fn">${esc(a.label)}</span><span class="x" onclick="removeFinding(${fi})">✕</span></div>`;
    if(s.lat){ h+=`<div class="axlab">Side</div><div class="subchips">`+['Left','Right','Bilateral'].map(L=>`<button class="subchip lat ${f.lat===L?'on':''}" onclick="setAxis(${fi},'lat','${L}')">${L}</button>`).join('')+`</div>`; }
    if(s.sev&&s.sev.length){ h+=`<div class="axlab">Severity</div><div class="subchips">`+s.sev.map(v=>`<button class="subchip ${f.sev===v?'on':''}" onclick="setAxis(${fi},'sev','${esc(v)}')">${esc(v)}</button>`).join('')+`</div>`; }
    if(s.loc&&s.loc.length){ h+=`<div class="axlab">Location</div><div class="subchips">`+s.loc.map(l=>`<button class="subchip ${f.loc===l?'on':''}" onclick="setAxis(${fi},'loc','${esc(l)}')">${esc(l)}</button>`).join('')+`</div>`; }
    h+=`<div class="axlab">Onset</div><div class="subchips">`+ONSETS.map(o=>`<button class="subchip ${f.onset===o?'on':''}" onclick="setAxis(${fi},'onset','${o}')">${o}</button>`).join('')+`</div>`;
    h+=`<div class="fbtns">`;
    if(s.body) h+=`<button onclick="showBodyFor(${fi})"><span class="ic">${I_BODY}</span>Body map</button>`;
    h+=`<label><span class="ic">${I_CAM}</span>Photo<input type="file" accept="image/*" capture="environment" style="display:none" onchange="addPhoto(event,${fi})"></label>`;
    h+=`</div>`;
    const ph=photos[sSys+'-'+f.abnIdx]; if(ph)h+=`<img class="fthumb" src="${ph}">`;
    h+=`</div>`;
  });
  $('sheetAxes').innerHTML=h;
}
function setAxis(fi,axis,val){ if(work[fi][axis]===val)work[fi][axis]=''; else work[fi][axis]=val; buzz(5); renderAxes(); }
function removeFinding(fi){ const ai=work[fi].abnIdx; work.splice(fi,1); delete photos[sSys+'-'+ai]; buzz(8);
  const chip=document.querySelector('#sheetChips .chip[data-i="'+ai+'"]'); if(chip){chip.classList.remove('on');chip.setAttribute('aria-pressed','false');}
  renderAxes(); refreshSave(); }
function addPhoto(e,fi){ const file=e.target.files&&e.target.files[0]; if(!file)return; const ai=work[fi].abnIdx;
  const rd=new FileReader(); rd.onload=()=>{ photos[sSys+'-'+ai]=rd.result; renderAxes(); }; rd.readAsDataURL(file); }
function refreshSave(){ const b=$('saveBtn'); if(b)b.disabled = work.length===0 && !$('freeIn').value.trim(); }
function sheetSave(){ const free=$('freeIn').value.trim(); if(work.length===0&&!free)return;
  const si=sSys; pushUndo(si); enc.results[si]={status:'flag',findings:work.map(f=>({...f})),free,negatives:R(si).negatives||[]}; buzz(12); closeSheet(()=>advance()); }
function sheetMarkClear(){ const si=sSys; pushUndo(si); enc.results[si]={status:'clear',findings:[],free:'',negatives:R(si).negatives||[]}; closeSheet(()=>advance()); }
function dismissSheet(){ closeSheet(()=>{ if($('v-deck').classList.contains('on'))renderDeck(); }); }
function closeSheet(cb){ $('scrim').classList.remove('on'); $('sheet').classList.remove('on'); setTimeout(cb||(()=>{}),300); }

/* ---- body map ---- */
function hideBody(){ $('sheetBody').style.display='none'; bodyForFinding=-1; }
function showBodyFor(fi){ bodyForFinding=fi; bodySide='front'; renderBody(); const el=$('sheetBody'); el.style.display=''; el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
function setBodySide(side){ bodySide=side; renderBody(); }
function renderBody(){
  const f=work[bodyForFinding]; const cur=f?f.loc:'';
  const shapes=BODY_REGIONS.map(r=>{ const lab=bodySide==='back'?r.back:r.label; const on=cur===lab;
    if(r.s==='e')return `<ellipse class="rg ${on?'on':''}" cx="${r.cx}" cy="${r.cy}" rx="${r.rx}" ry="${r.ry}" onclick="tapRegion('${r.id}')"></ellipse>`;
    return `<rect class="rg ${on?'on':''}" x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" rx="${r.r}" onclick="tapRegion('${r.id}')"></rect>`; }).join('');
  $('sheetBody').innerHTML=`<div class="axlab">Tap location on body</div>
    <div class="bodytabs"><button class="${bodySide==='front'?'on':''}" onclick="setBodySide('front')">Front</button><button class="${bodySide==='back'?'on':''}" onclick="setBodySide('back')">Back</button></div>
    <svg class="bodysvg" viewBox="0 0 200 410">${shapes}</svg>
    <div class="bodysel">${cur?esc(cur):'—'}</div>
    <div class="fbtns" style="justify-content:center"><button onclick="hideBody()">Done</button></div>`;
}
function tapRegion(id){ const r=BODY_REGIONS.find(x=>x.id===id); const lab=bodySide==='back'?r.back:r.label;
  if(bodyForFinding<0)return; work[bodyForFinding].loc=(work[bodyForFinding].loc===lab)?'':lab; buzz(8); renderBody(); renderAxes(); }

/* ---- voice (offline-first: OS keyboard mic; webkit recognition if present) ---- */
let recog=null, recing=false;
function toggleMic(){ const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ $('freeIn').focus(); toast('Use your keyboard mic to dictate'); return; }
  if(recing){ recog&&recog.stop(); return; }
  recog=new SR(); recog.lang='en-US'; recog.interimResults=false; recog.maxAlternatives=1;
  recog.onresult=ev=>{ const t=ev.results[0][0].transcript; const inp=$('freeIn'); inp.value=(inp.value?inp.value+' ':'')+t; refreshSave(); };
  recog.onend=()=>{ recing=false; $('micBtn').classList.remove('rec'); };
  recog.onerror=()=>{ recing=false; $('micBtn').classList.remove('rec'); toast('Dictation unavailable offline — use keyboard mic'); };
  try{ recog.start(); recing=true; $('micBtn').classList.add('rec'); }catch(e){}
}

/* ---- jump sheet ---- */
function openJump(){
  $('jumpList').innerHTML=deck.map((si,pos)=>{ const r=R(si);
    const st=r.status==='flag'?'flag':r.status==='deferred'?'def':r.status==='clear'?'clear':'';
    const lbl=r.status==='pending'?'':r.status;
    return `<div class="listrow" onclick="jumpTo(${pos})"><span class="gi">${ICONS[SYSTEMS[si].icon]}</span><span class="nm">${SYSTEMS[si].name}</span><span class="st ${st}">${lbl}</span></div>`; }).join('');
  $('scrim2').classList.add('on'); $('sheet2').classList.add('on');
}
function closeJump(){ $('scrim2').classList.remove('on'); $('sheet2').classList.remove('on'); }
function jumpTo(pos){ closeJump(); idx=pos; _fromReview=false; if(!$('v-deck').classList.contains('on'))showView('v-deck'); renderDeck(); }
/* ---- compile engine ---- */
function curClauses(i){ const s=SYSTEMS[i]; return (s.clausesLong&&neuroLong)?s.clausesLong:s.clauses; }
function stripToken(clause, token){
  if(!token||clause==null)return clause;
  const tok=token.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); let c=clause;
  if(new RegExp(tok+'\\s*,\\s*','i').test(c)) c=c.replace(new RegExp(tok+'\\s*,\\s*','i'),'');
  else if(new RegExp(',\\s*'+tok,'i').test(c)) c=c.replace(new RegExp(',\\s*'+tok,'i'),'');
  else c=c.replace(new RegExp(tok,'i'),'');
  c=c.replace(/\s+/g,' ')
     .replace(/\s+,/g,',').replace(/,\s*,/g,',')
     .replace(/,\s*;/g,';').replace(/;\s*,/g,';').replace(/;\s*;/g,';').replace(/:\s*;\s*/g,': ')
     .replace(/\s+(or|and)\s*;/gi,';')
     .replace(/\b(No|no)\s+(or|and)\s+/g,'$1 ')
     .replace(/\bno\s*;\s*no\b/gi,'No').replace(/\b(No|no)\s*;\s*/g,'$1 ')
     .replace(/,\s*(or|and)\s*\./gi,'.').replace(/\s+(or|and)\s*\./gi,'.')
     .replace(/\b(or|and)\s+of\b/gi,'of')
     .replace(/\b(No|no)\s*,\s*/g,'$1 ')
     .replace(/,\s*(or|and)\b/gi,' $1')
     .replace(/\s+(with|without)\s*\./gi,'.').replace(/\s+(with|without)\s*;/gi,';')
     .replace(/;\s*\./g,'.').replace(/,\s*\./g,'.').replace(/\s+\./g,'.').replace(/\.\s*\./g,'.')
     .replace(/\s{2,}/g,' ').trim();
  if(c&&!/[.)\]]$/.test(c))c+='.';
  return c;
}
function findingText(s,f){ const a=s.abn[f.abnIdx]; const det=[f.sev,f.lat,f.loc].filter(Boolean).join(', ');
  const on=f.onset?' × '+f.onset.toLowerCase():''; return a.text+(det?` (${det})`:'')+on; }
function findingPlain(s,f){ return findingText(s,f).toLowerCase(); }
function negSentence(t){ return /[.!?]$/.test(t)?t:t+'.'; }
function vitalsLine(vals,bold){
  const out=[]; const ff=k=>{const f=VITAL_FIELDS.find(x=>x.key===k);return fieldFlagged(f,vals[k]);};
  const wrap=(t,fl)=>(bold&&fl)?`<b>${t}</b>`:t;
  const has=k=>vals[k]!=null&&vals[k]!=='';
  if(has('sys')||has('dia')){ const f=VITAL_FIELDS.find(x=>x.key==='sys'),g=VITAL_FIELDS.find(x=>x.key==='dia');
    out.push(wrap(`BP ${fmtVal(f,vals.sys)}/${fmtVal(g,vals.dia)}`, ff('sys')||ff('dia'))); }
  [['hr','HR',' bpm'],['rr','RR',''],['temp','Temp','°F'],['spo2','SpO₂','%'],['wt','Wt',' lb'],['pain','Pain','/10']].forEach(([k,lab,u])=>{
    if(has(k)){ const f=VITAL_FIELDS.find(x=>x.key===k); out.push(wrap(`${lab} ${fmtVal(f,vals[k])}${u}`, ff(k))); }
  });
  return out.join(', ');
}
function sectionHTML(i){
  const s=SYSTEMS[i], r=R(i);
  if(s.type==='value'){ if(r.status==='deferred')return `<b>VITALS:</b> Deferred — not obtained.`;
    const ln=vitalsLine(r.values||{},true); return `<b>VITALS:</b> ${ln||'Not recorded.'}`; }
  if(r.status==='deferred')return `<b>${s.name}:</b> Deferred — unable to assess.`;
  if(r.status==='flag'){
    const clauses=curClauses(i).slice();
    r.findings.forEach(f=>{ const a=s.abn[f.abnIdx]; if(a.cancel>=0&&a.cancel<clauses.length){ if(a.token)clauses[a.cancel]=stripToken(clauses[a.cancel],a.token); else clauses[a.cancel]=null; } });
    const kept=clauses.filter(c=>c&&c.trim());
    const abn=r.findings.map(f=>`<b>${esc(findingText(s,f))}.</b>`);
    if(r.free&&r.free.trim())abn.push(`<b>${esc(r.free.trim())}.</b>`);
    const negs=(r.negatives||[]).map(n=>`<span class="neg">${esc(negSentence(n))}</span>`);
    return `<b>${s.name}:</b> ${[...kept,...abn,...negs].join(' ')}`;
  }
  const base=curClauses(i).join(' ');
  const negs=(r.negatives||[]).map(n=>`<span class="neg">${esc(negSentence(n))}</span>`);
  return `<b>${s.name}:</b> ${[base,...negs].join(' ')}`;
}
function sectionText(i){ const d=document.createElement('div'); d.innerHTML=sectionHTML(i); return d.innerText; }

/* ---- review ---- */
function openReview(){ tab='chart'; $('tabChart').classList.add('on'); $('tabNote').classList.remove('on');
  $('adate').value=enc.date||todayStr(); $('adateInit').value=enc.initials||'';
  renderReview(); showView('v-review'); syncEnc(); }
function setTab(t){ tab=t; $('tabChart').classList.toggle('on',t==='chart'); $('tabNote').classList.toggle('on',t==='note'); renderReview(); }
function toggleNeuro(){ neuroLong=!neuroLong; renderReview(); }
function renderReview(){
  enc.initials=$('adateInit').value.trim(); enc.date=$('adate').value;
  const sc=$('rvScroll');
  if(tab==='note'){ sc.innerHTML=`<div class="notebox">${esc(buildNote())}</div>`; return; }
  let h='';
  deck.forEach(si=>{ const s=SYSTEMS[si], r=R(si);
    const isAbn = r.status==='flag' || (s.type==='value'&&r.flagged);
    const cls = r.status==='deferred'?'def':(isAbn?'abn':'norm');
    const tag = r.status==='deferred'?'deferred':(isAbn?'flagged':'clear');
    let body=sectionHTML(si).replace(/^<b>[^<]*<\/b>\s*/,'');
    let thumbs=''; if(r.findings){ r.findings.forEach(f=>{ const p=photos[si+'-'+f.abnIdx]; if(p)thumbs+=`<img src="${p}">`; }); }
    h+=`<div class="sec ${cls}" onclick="editSection(${si})">
      <div class="h"><span class="gi">${ICONS[s.icon]}</span><span class="nm">${s.name}</span><span class="tag">${tag}</span></div>
      <div class="txt">${body}</div>
      ${thumbs?`<div class="thumbs">${thumbs}</div>`:''}
      ${s.clausesLong?`<span class="neuro-tog" onclick="event.stopPropagation();toggleNeuro()">${neuroLong?'▼ long-form cranial nerves':'▶ long-form cranial nerves'}</span>`:''}
    </div>`;
  });
  sc.innerHTML=h;
}
function editSection(si){ idx=deck.indexOf(si); _fromReview=true; showView('v-deck'); renderDeck(); if(R(si).status==='flag')openSheet(si); }
function editFromReview(){ _fromReview=false; idx=0; showView('v-deck'); renderDeck(); }
function leaveReview(){ syncEnc(); showHistory(); }
function finishAndClose(){ const pend=deck.filter(si=>R(si).status==='pending').length; if(pend){toast(pend+' systems still pending');return;}
  enc.status='complete'; syncEnc(); showHistory(); toast('Encounter saved'); }

/* ---- suggested note ---- */
function buildNote(){
  const ini=$('adateInit').value.trim()||'Patient', dt=$('adate').value||enc.date; const L=[];
  L.push(`${ini} — ${dt}`);
  if(deck.includes(VITALS)){ const r=R(VITALS); if(r.status==='deferred')L.push('Vitals not obtained.');
    else { const ln=vitalsLine(r.values||{},false); if(ln)L.push('Vitals: '+ln+'.'); } }
  const pos=[]; deck.forEach(si=>{ if(si===VITALS)return; const r=R(si); if(r.status==='flag'){
    const txt=r.findings.map(f=>findingPlain(SYSTEMS[si],f)).concat(r.free&&r.free.trim()?[r.free.trim()]:[]).join(', ');
    pos.push(`${SYSTEMS[si].name.toLowerCase()} — ${txt}`); } });
  const negs=[]; deck.forEach(si=>{ const r=R(si); if(r.negatives&&r.negatives.length)negs.push(...r.negatives); });
  const def=[]; deck.forEach(si=>{ if(R(si).status==='deferred')def.push(SYSTEMS[si].name.toLowerCase()); });
  if(pos.length){ L.push(''); L.push('Pertinent findings on exam: '+pos.join('; ')+'.'); }
  if(negs.length){ L.push(''); L.push('Pertinent negatives: '+negs.map(n=>n.replace(/^Denies /i,'no ')).join(', ')+'.'); }
  if(def.length){ L.push(''); L.push('Deferred / unable to assess: '+def.join(', ')+'.'); }
  const normal=deck.filter(si=>si!==VITALS && R(si).status==='clear').map(si=>SYSTEMS[si].name.toLowerCase());
  if(normal.length){ L.push(''); L.push('All other systems examined without abnormal findings ('+normal.join(', ')+').'); }
  return L.join('\n');
}

/* ---- output: copy / share (current tab) ---- */
function buildExam(){
  const date=$('adate').value, ini=$('adateInit').value.trim(); const h=[],x=[];
  const hdr=`Date of Exam: ${date}`+(ini?`   Patient: ${ini}`:''); h.push(`<b>${esc(hdr)}</b>`); x.push(hdr);
  h.push('<b>PHYSICAL EXAM</b>'); x.push('PHYSICAL EXAM');
  deck.forEach(si=>{ h.push(sectionHTML(si)); x.push(sectionText(si)); });
  return {html:h.join('<br><br>'), text:x.join('\n\n')};
}
function currentOutput(){ if(tab==='note'){ const t=buildNote(); return {html:esc(t).replace(/\n/g,'<br>'), text:t}; } return buildExam(); }
function copyCurrent(){ const {html,text}=currentOutput();
  if(navigator.clipboard&&window.ClipboardItem){
    navigator.clipboard.write([new ClipboardItem({'text/html':new Blob(['<meta charset="utf-8">'+html],{type:'text/html'}),'text/plain':new Blob([text],{type:'text/plain'})})]).then(()=>toast('Copied')).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text); }
function fallbackCopy(text){ const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');toast('Copied');}catch(e){toast('Copy unavailable');} document.body.removeChild(ta); }
function shareCurrent(){ const {text}=currentOutput(); if(navigator.share){navigator.share({title:'Exam',text}).catch(()=>{});} else copyCurrent(); }

/* ---- init ---- */
function _fixH(){ const a=document.getElementById('app'); if(a)a.style.height=window.innerHeight+'px'; }
window.addEventListener('resize',_fixH); _fixH();
if(typeof document!=='undefined'){ restore(); showSetup(); }
if(typeof module!=='undefined'&&module.exports){ module.exports={stripToken,SYSTEMS}; }
